<!DOCTYPE html>
<html lang="en">
<head>
    <title>Task Manager</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar Start -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
  <div class="container">

    <a class="navbar-brand" href="index.html">TaskManager</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">

      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link active" href="Add-task.html">Add-task</a>
        </li>

        <li class="nav-item">
          <a class="nav-link" href="view-task.html">View-task</a>
        </li>
      </ul>

      <!-- Search -->
      <form class="d-flex">
        <input class="form-control me-2" type="search" placeholder="Search Task">

        <select id="priorityFilter" class="form-select me-2">
          <option value="All">All</option>
          <option value="High">High</option>
          <option value="Medium">Medium</option>
          <option value="Low">Low</option>
        </select>

        <button class="btn btn-success">Search</button>
      </form>

    </div>
  </div>
