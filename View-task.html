<!doctype html>
<html lang="en">

<head>
    <title>View Tasks</title>

    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg bg-body-tertiary">
    <div class="container">
        <a class="navbar-brand" href="./index.html">TaskManager</a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menu">

            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" href="./add-task.html">Add-task</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="./view-task.html">View-task</a>
                </li>
            </ul>

            <form class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Search Task">

                <select id="priorityFilter" class="form-select me-2">
                    <option value="All">All Priorities</option>
                    <option value="High">High</option>
                    <option value="Medium">Medium</option>
                    <option value="Low">Low</option>
                </select>

                <button class="btn btn-outline-success">Search</button>
            </form>

        </div>
    </div>
</nav>


<!-- Table -->
<div class="container mt-5">

    <h2 class="mb-4">Tasks</h2>

    <div class="table-responsive">
        <table id="myTable" class="table table-dark table-bordered table-striped table-hover">

            <thead>
                <tr>
                    <th>Sr.No</th>
                    <th>Title</th>
                    <th>Description</th>
                    <th>Due Date</th>
                    <th>Priority</th>
                    <th>Action</th>
                </tr>
            </thead>

            <tbody>
                <!-- Tasks will come here by JS -->
            </tbody>

        </table>
    </div>

</div>


<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="../js/script.js"></script>

</body>
</html>
